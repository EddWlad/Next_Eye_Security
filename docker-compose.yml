services:
  postgres:
    image: postgres:16
    container_name: nexteye-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: nexteye_security
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5435:5432'
    volumes:
      - nexteye_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nexteye_security']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nexteye_postgres_data:
