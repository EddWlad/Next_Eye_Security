<section class="login-view">
  <article class="login-card card">
    <header>
      <img alt="Logo Next Eye Security" src="logo_login.png" />
      <h1>Next Eye Security</h1>
      <p>Portal administrativo para operaciones y cotizaciones.</p>
    </header>

    <form [formGroup]="form" (ngSubmit)="submit()" novalidate>
      <div class="field">
        <label for="email">Correo electrónico</label>
        <input class="input" id="email" formControlName="email" type="email" placeholder="tu.correo@empresa.com" />
        <small class="error-text" *ngIf="form.controls.email.touched && form.controls.email.invalid">
          Ingresa un correo válido.
        </small>
      </div>

      <div class="field">
        <label for="password">Contraseña</label>
        <div class="password-box">
          <input
            class="input"
            id="password"
            formControlName="password"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="••••••••"
          />
          <button type="button" (click)="togglePassword()">
            <span class="material-symbols-outlined">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
        <small class="error-text" *ngIf="form.controls.password.touched && form.controls.password.invalid">
          La contraseña debe tener al menos 6 caracteres.
        </small>
      </div>

      <button class="btn btn-primary submit" type="submit" [disabled]="loading()">
        <span class="material-symbols-outlined">login</span>
        {{ loading() ? 'Ingresando...' : 'Iniciar Sesión' }}
      </button>
    </form>
  </article>
</section>
